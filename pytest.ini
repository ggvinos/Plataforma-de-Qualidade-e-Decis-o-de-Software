[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning:streamlit
markers =
    unit: Testes unitários (rápidos, sem I/O)
    integration: Testes de integração (podem usar mocks)
    e2e: Testes end-to-end (mais lentos)
    slow: Testes lentos (marcar para pular com -m "not slow")
